name: Publish (npm + provenance)

# Publica a npm con provenance (sigstore) al crear un tag vX.Y.Z.
# Requiere el secret NPM_TOKEN (Automation token) configurado en el repo.

on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: read
  id-token: write # necesario para provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - name: Tests antes de publicar
        run: node --test cli/test/*.test.mjs
      - name: Verificar que el tag coincide con package.json
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "El tag ($TAG) no coincide con package.json ($PKG)"; exit 1
          fi
      - name: Publicar con provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
